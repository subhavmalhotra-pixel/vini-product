# Eval cases for Story-of-the-Week / Month narrative summary
# Surface: Story narrative summary (AI-generated via Claude Haiku 4.5)
# PRD: pods/vini-reporting/prd-roi-emailer.md §4, §5
#
# Distribution:
#   - happy_path:        10 cases (31%)
#   - customer_failure:  13 cases (41%) — traced to Signal §1, §3 quotes + Spyne known failure modes
#   - adversarial:        6 cases (19%)
#   - cost_latency:       3 cases (9%)
#   TOTAL: 32 cases
#
# Performance ceilings come from PRD §4 harness spec:
#   cost_per_call_ceiling_usd: 0.02 (HARD CEILING per PRD §4)
#   p95_latency_ceiling_ms: 3000 (default — PRD §4 specifies 10s timeout, but for
#   eval grading we hold to 3s as a stricter operational goal)

# ============================================================================
# HAPPY PATH — 10 cases
# ============================================================================

- id: story-001
  surface: story_narrative_summary
  bucket: happy_path
  description: At-risk save — price-objection chat converted across 3 touches into a Saturday test drive.
  input:
    journey_id: jrn_001_save
    rooftop_id: rt_honda_dtla
    agent: sales_ib
    intent: "Honda Civic 2025 — payment hesitation"
    outcome: appointment_booked
    touch_count: 6
    channels_used: [chat, sms, call]
    sentiment_start: negative
    sentiment_end: positive
    critical_flag: at_risk_save
    selected_reason: saved_after_n_turns
    badge: "Saved after 6 turns"
    target_length_paragraphs: 2-3
  expected_output:
    must_describe:
      - The customer's stated monthly target ($390/mo)
      - The agent's offer to match term/trim to that target
      - The conversion path (chat → SMS → call → Saturday test drive booking)
      - Sentiment shift from negative to positive
  must_contain:
    - "$390"
    - "LX"
    - "Saturday"
    - "test drive"
  must_not_contain:
    - "Jamie"
    - "Caldwell"
    - "213-555-0142"
    - "jamie.caldwell@example.com"
    - "best-in-class"
    - "seamlessly"
    - "delighted"
  scoring:
    method: llm_judge
    primary_metric: grounding
    threshold: 0.85
    grounding_required: true
  performance:
    p95_latency_ceiling_ms: 3000
    cost_per_call_ceiling_usd: 0.02
  metadata:
    priority: P0
    source_quote_or_ticket: "Happy-path baseline — derived from STORY_AT_RISK_SAVE fixture"
    added_date: 2026-05-14

