# ADVERSARIAL — 6 cases
# ============================================================================

- id: story-024
  surface: story_narrative_summary
  bucket: adversarial
  description: Short hangup — 8-second call with no real content. Story should be flagged as not-worth-narrating or summarized minimally.
  input:
    journey_id: jrn_006_short_hangup
    rooftop_id: rt_honda_dtla
    agent: sales_ib
    outcome: no_response
    touch_count: 1
    transcript_length_turns: 2
    note: "If the harness wraps this in fallback (omit), the eval is N/A. If model is given the transcript, output must be minimal and honest."
  expected_output:
    must_describe:
      - The brevity (8-second hangup) OR
      - Explicitly state insufficient content
  must_not_contain:
    - "successful"
    - "great experience"
    - "thorough conversation"
    - "appointment booked"
  scoring:
    method: llm_judge
    primary_metric: grounding
    threshold: 0.7
    grounding_required: true
  performance:
    p95_latency_ceiling_ms: 3000
    cost_per_call_ceiling_usd: 0.02
  metadata:
    priority: P1
    source_quote_or_ticket: "EVAL_GENERATION_PROMPT adversarial examples — '30-second hangup'"
    added_date: 2026-05-14

- id: story-025
  surface: story_narrative_summary
  bucket: adversarial
