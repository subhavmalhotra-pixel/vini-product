# Vini Console — Action Items · Eval Set
#
# Mirrors PRD §5 — 35 cases across 6 buckets:
#   happy_path    (12)
#   multi_intent  (6)
#   hitl          (4)
#   dedup         (4)
#   adversarial   (5)
#   cost_latency  (4)
#
# Each case has:
#   id           - stable identifier
#   bucket       - one of the 6 above
#   name         - short human-readable
#   conversation - input to the extractor
#   existing_pending - pre-existing items for dedup tests
#   expected     - rubric expectations (intent ids, primary, recap rules)

cases:

  # ============================================================
  # HAPPY PATH (12) — one case per common intent in §10.5
  # ============================================================

  - id: hp-001
    bucket: happy_path
    name: Status update — single intent
    conversation:
      conversation_id: hp-001
      customer_id: c-test-1
      customer_name: Test Caller
      channel: call
      rooftop_id: mb-laguna
      turns:
        - speaker: customer
          text: "Hi, I'm just checking the status of my service repair."
          timestamp: "2026-05-19T10:00:00-07:00"
        - speaker: agent
          text: "Let me note that down — your advisor will follow up shortly."
          timestamp: "2026-05-19T10:00:30-07:00"
    expected:
      intent_ids: [status_update]
      primary_intent_id: status_update
      created_events: 1
      recap_must_contain: [customer, status]
      recap_must_not_contain: [Test, Caller]

  - id: hp-002
    bucket: happy_path
    name: Pricing quote — single intent
    conversation:
      conversation_id: hp-002
      customer_id: c-test-2
      customer_name: Test Caller
      channel: email
      rooftop_id: mb-laguna
      turns:
        - speaker: customer
          text: "Can you send me a pricing quote on the 60k-mile service?"
          timestamp: "2026-05-19T10:00:00-07:00"
    expected:
      intent_ids: [pricing_quote]
      primary_intent_id: pricing_quote
      created_events: 1

  - id: hp-003
    bucket: happy_path
    name: Recall response — single intent
    conversation:
      conversation_id: hp-003
      customer_id: c-test-3
      customer_name: Test Caller
      channel: call
      rooftop_id: mb-laguna
      turns:
        - speaker: customer
          text: "Got a recall notice on my E 350. Can you check if my car is affected?"
          timestamp: "2026-05-19T10:00:00-07:00"
    expected:
      intent_ids: [recall_response]
      primary_intent_id: recall_response
      created_events: 1

  - id: hp-004
    bucket: happy_path
    name: Callback request
    conversation:
      conversation_id: hp-004
      customer_id: c-test-4
      customer_name: Test Caller
      channel: chat
      rooftop_id: mb-laguna
      turns:
        - speaker: customer
          text: "Could someone call me back this afternoon? I want to talk through a lease."
          timestamp: "2026-05-19T10:00:00-07:00"
    expected:
      intent_ids: [callback_request]
      primary_intent_id: callback_request
      created_events: 1

  - id: hp-005
    bucket: happy_path
    name: Appointment inquiry
    conversation:
      conversation_id: hp-005
      customer_id: c-test-5
      customer_name: Test Caller
      channel: sms
      rooftop_id: mb-laguna
      turns:
        - speaker: customer
          text: "Hi, I want to book an appointment for next Thursday morning."
          timestamp: "2026-05-19T10:00:00-07:00"
    expected:
      intent_ids: [appointment_inquiry]
      primary_intent_id: appointment_inquiry
      created_events: 1

  - id: hp-006
    bucket: happy_path
    name: Vehicle inquiry
    conversation:
      conversation_id: hp-006
      customer_id: c-test-6
      customer_name: Test Caller
      channel: email
      rooftop_id: mb-laguna
      turns:
        - speaker: customer
          text: "What GLC 300s do you currently have in your shopping inventory?"
          timestamp: "2026-05-19T10:00:00-07:00"
    expected:
      intent_ids: [vehicle_inquiry]
      primary_intent_id: vehicle_inquiry
      created_events: 1

  - id: hp-007
    bucket: happy_path
    name: Specific salesperson — Named adviser
    conversation:
      conversation_id: hp-007
      customer_id: c-test-7
      customer_name: Test Caller
      channel: call
      rooftop_id: mb-laguna
      turns:
        - speaker: customer
          text: "Hi, is David available? He sold me my last car and I want to ask for him specifically."
          timestamp: "2026-05-19T10:00:00-07:00"
    expected:
